hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# Disable reward model completely to avoid CheckServer dependency
reward_model:
  enable: False
  reward_manager: custom

data:
  max_prompt_length: 1536
  max_response_length: 512
  train_batch_size: 64
  return_raw_chat: True
  prompt_key: prompt
  filter_overlong_prompts: True
  truncation: 'right'

actor_rollout_ref:
  hybrid_engine: True
  rollout:
    name: sglang
    multi_turn:
      enable: True
      max_assistant_turns: 5
